[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Defense-in-depth HTTP -> HTTPS redirect for the apex domain.
# Also enable "Force HTTPS" in Netlify site settings (Domain management),
# which is the authoritative enforcement — this rule is a backstop.
[[redirects]]
  from = "http://menshairtostay.co.uk/*"
  to = "https://menshairtostay.co.uk/:splat"
  status = 301
  force = true

# SPA catch-all so client-side routes (React Router) resolve on refresh/direct hit.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://menshairtostay.trafft.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev https://i.ytimg.com https://img.youtube.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src https://menshairtostay.trafft.com https://www.google.com https://www.youtube.com"

# Long-cache hashed build assets; index.html stays revalidated (default, no override needed).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
